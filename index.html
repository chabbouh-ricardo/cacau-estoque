<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Cacau Show">
<title>Cacau Show — Estoque</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=DM+Mono:wght@400;500&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0F0A06;--bg2:#1A1108;--bg3:#241A0E;--bg4:#2E2214;
  --gold:#C8972A;--gold2:#E8B84B;--choc:#8B5E3C;
  --text:#F5EDD8;--text2:#B8A68C;--text3:#7A6A54;
  --border:rgba(200,151,42,0.15);--border2:rgba(200,151,42,0.3);
  --green:#4CAF7A;--red:#E05757;--amber:#E8A020;
  --radius:14px;--radius-sm:10px;--radius-lg:20px;
  --font:'DM Sans',sans-serif;
  --safe-b:env(safe-area-inset-bottom,0px);
  --safe-t:env(safe-area-inset-top,0px);
  --nav-h:64px;
  --sidebar-w:240px;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font);font-size:15px;line-height:1.5}

/* ─── DESKTOP LAYOUT ─── */
.shell{display:flex;height:100vh;height:100dvh}

/* SIDEBAR — visible on desktop */
.sidebar{
  width:var(--sidebar-w);flex-shrink:0;
  background:var(--bg2);border-right:1px solid var(--border);
  display:flex;flex-direction:column;
  padding:24px 0 0;
  overflow-y:auto;
}
.sb-logo{display:flex;align-items:center;gap:10px;padding:0 20px 24px;border-bottom:1px solid var(--border);margin-bottom:16px}
.sb-logo-icon{width:36px;height:36px;background:linear-gradient(135deg,var(--gold),var(--choc));border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.sb-logo-name{font-size:14px;font-weight:600;color:var(--text)}
.sb-logo-sub{font-size:11px;color:var(--text3);margin-top:1px}
.sb-nav{padding:0 12px;flex:1}
.sb-nav-label{font-size:10px;font-weight:600;color:var(--text3);letter-spacing:.1em;text-transform:uppercase;padding:0 8px;margin-bottom:6px}
.sb-item{display:flex;align-items:center;gap:10px;padding:10px 10px;border-radius:var(--radius-sm);cursor:pointer;color:var(--text2);font-size:13px;font-weight:400;border:none;background:none;width:100%;text-align:left;transition:.15s;position:relative}
.sb-item svg{width:18px;height:18px;opacity:.55;flex-shrink:0;transition:.15s}
.sb-item:hover{background:var(--bg3);color:var(--text)}
.sb-item:hover svg{opacity:.9}
.sb-item.active{background:rgba(200,151,42,.12);color:var(--gold2);font-weight:500}
.sb-item.active svg{opacity:1}
.sb-badge{margin-left:auto;background:var(--red);color:#fff;font-size:10px;font-weight:700;padding:1px 6px;border-radius:99px;line-height:16px;display:none}
.sb-stores{padding:16px 12px calc(16px + var(--safe-b));border-top:1px solid var(--border);margin-top:auto}
.sb-stores-label{font-size:10px;font-weight:600;color:var(--text3);letter-spacing:.1em;text-transform:uppercase;margin-bottom:8px;padding:0 8px}
.sb-store-btn{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:var(--radius-sm);cursor:pointer;border:none;background:none;color:var(--text2);font-size:13px;font-family:var(--font);transition:.15s;width:100%}
.sb-store-btn:hover{background:var(--bg3);color:var(--text)}
.sb-store-btn.active{background:rgba(200,151,42,.12);color:var(--gold2);font-weight:500}
.sb-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}

/* MAIN AREA */
.main-area{flex:1;display:flex;flex-direction:column;min-width:0;overflow:hidden}

/* DESKTOP TOPBAR */
.d-topbar{
  display:flex;align-items:center;justify-content:space-between;
  padding:20px 28px 0;flex-shrink:0;gap:16px;flex-wrap:wrap;
}
.d-topbar-left .page-title{font-size:22px;font-weight:600;color:var(--text)}
.d-topbar-left .page-sub{font-size:13px;color:var(--text3);margin-top:2px}
.d-topbar-actions{display:flex;gap:8px;align-items:center}
.d-search-wrap{position:relative}
.d-search-wrap svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);opacity:.35;pointer-events:none}
.d-search{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);padding:8px 12px 8px 34px;color:var(--text);font-family:var(--font);font-size:13px;width:200px;transition:.2s;outline:none}
.d-search:focus{border-color:var(--border2);width:240px}
.d-search::placeholder{color:var(--text3)}

/* SCROLL CONTENT */
.content-scroll{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch}

/* ─── MOBILE TOPBAR (hidden on desktop) ─── */
.m-topbar{display:none;padding:14px 18px 12px;align-items:center;justify-content:space-between;gap:12px;background:var(--bg);border-bottom:1px solid var(--border);flex-shrink:0;padding-top:calc(14px + var(--safe-t))}
.m-logo{display:flex;align-items:center;gap:10px}
.m-logo-icon{width:32px;height:32px;background:linear-gradient(135deg,var(--gold),var(--choc));border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.m-logo-name{font-size:15px;font-weight:600}
.m-logo-sub{font-size:12px;color:var(--text3);margin-top:1px}
.m-alert-badge{background:var(--red);color:#fff;font-size:11px;font-weight:700;padding:3px 9px;border-radius:99px;display:none}

/* LOJA BAR — shown on both */
.loja-bar{display:flex;gap:7px;padding:12px 20px;overflow-x:auto;scrollbar-width:none;flex-shrink:0;border-bottom:1px solid var(--border)}
.loja-bar::-webkit-scrollbar{display:none}
.loja-pill{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:99px;border:1px solid var(--border);background:var(--bg2);color:var(--text3);font-size:13px;white-space:nowrap;cursor:pointer;font-family:var(--font);transition:.15s}
.loja-pill.active{background:rgba(200,151,42,.15);border-color:var(--border2);color:var(--gold2);font-weight:500}
.loja-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}

/* ─── BOTTOM NAV (mobile only) ─── */
.bnav{
  display:none;
  position:fixed;bottom:0;left:0;right:0;
  height:calc(var(--nav-h) + var(--safe-b));
  padding-bottom:var(--safe-b);
  background:var(--bg2);border-top:1px solid var(--border);
  z-index:100;align-items:stretch;
}
.nb{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;background:none;border:none;cursor:pointer;color:var(--text3);font-family:var(--font);font-size:10px;padding:0;transition:.15s;position:relative}
.nb.active{color:var(--gold2)}
.nb-ico-wrap{width:44px;height:28px;display:flex;align-items:center;justify-content:center}
.nb.active .nb-ico-wrap{background:rgba(200,151,42,.12);border-radius:10px}
.nb svg{width:20px;height:20px}
.nb-badge{position:absolute;top:5px;right:calc(50% - 22px);background:var(--red);color:#fff;font-size:9px;font-weight:700;padding:1px 5px;border-radius:99px;line-height:14px;display:none;min-width:16px;text-align:center}

/* ─── PAGES ─── */
.page{display:none}
.page.active{display:block;animation:fadeUp .18s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.content-pad{padding:20px 28px 28px}
.content-pad-m{padding:16px 18px 20px}

/* METRICS */
.metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px}
.metric{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:16px;position:relative;overflow:hidden}
.metric::after{content:'';position:absolute;bottom:-12px;right:-12px;width:52px;height:52px;border-radius:50%;opacity:.1}
.metric.cg::after{background:var(--gold)}.metric.cgr::after{background:var(--green)}.metric.ca::after{background:var(--amber)}.metric.cr::after{background:var(--red)}
.ml{font-size:11px;color:var(--text3);font-weight:500;letter-spacing:.03em;text-transform:uppercase;margin-bottom:6px}
.mv{font-size:26px;font-weight:600;line-height:1}
.mv.gold{color:var(--gold2)}.mv.green{color:var(--green)}.mv.amber{color:var(--amber)}.mv.red{color:var(--red)}
.ms{font-size:11px;color:var(--text3);margin-top:3px}

/* SEARCH (desktop inline) */
.inline-search{position:relative;margin-bottom:14px}
.inline-search svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);opacity:.35;pointer-events:none}
.inline-search input{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 14px 10px 38px;color:var(--text);font-family:var(--font);font-size:14px;outline:none;transition:.2s}
.inline-search input:focus{border-color:var(--border2)}
.inline-search input::placeholder{color:var(--text3)}

/* CAT FILTERS */
.cat-row{display:flex;gap:7px;margin-bottom:16px;overflow-x:auto;scrollbar-width:none}
.cat-row::-webkit-scrollbar{display:none}
.cat-btn{padding:6px 14px;border-radius:99px;border:1px solid var(--border);background:var(--bg2);color:var(--text3);font-size:13px;white-space:nowrap;cursor:pointer;font-family:var(--font);transition:.15s}
.cat-btn.active{border-color:var(--border2);background:rgba(200,151,42,.12);color:var(--gold2);font-weight:500}

/* TABLE */
.table-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.table-header{padding:14px 20px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);gap:8px;flex-wrap:wrap}
.table-header-title{font-size:14px;font-weight:500}
table{width:100%;border-collapse:collapse}
thead th{font-size:11px;font-weight:600;color:var(--text3);letter-spacing:.06em;text-transform:uppercase;padding:10px 20px;text-align:left;background:var(--bg3);border-bottom:1px solid var(--border)}
tbody tr{transition:.12s}
tbody tr:hover{background:var(--bg3)}
tbody td{padding:12px 20px;border-bottom:1px solid rgba(200,151,42,.06);color:var(--text);font-size:13px;vertical-align:middle}
tbody tr:last-child td{border-bottom:none}

/* PROD CARDS (mobile) */
.prod-list{display:flex;flex-direction:column;gap:9px}
.prod-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;display:flex;align-items:center;gap:12px}
.prod-icon{width:42px;height:42px;border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;background:var(--bg3)}
.prod-info{flex:1;min-width:0}
.prod-name{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.prod-cat{font-size:12px;color:var(--text3);margin-top:1px}
.prod-right{text-align:right;flex-shrink:0}
.prod-qty{font-family:'DM Mono',monospace;font-size:22px;font-weight:500;line-height:1}
.prod-bar{height:3px;background:var(--bg4);border-radius:99px;margin-top:5px;width:48px;margin-left:auto}
.prod-bar-fill{height:100%;border-radius:99px}

/* QTY BAR (table) */
.qty-wrap{display:flex;align-items:center;gap:8px}
.qty-num{font-family:'DM Mono',monospace;font-size:14px;font-weight:500;min-width:32px}
.qty-bar-wrap{flex:1;height:3px;background:rgba(255,255,255,.06);border-radius:99px;min-width:50px;max-width:80px}
.qty-bar{height:100%;border-radius:99px}

/* BADGES */
.badge{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:99px;font-size:11px;font-weight:600;margin-top:3px}
.badge::before{content:'';width:5px;height:5px;border-radius:50%}
.b-ok{background:rgba(76,175,122,.15);color:#6FD4A0}.b-ok::before{background:#6FD4A0}
.b-low{background:rgba(232,160,32,.15);color:#F0BC4A}.b-low::before{background:#F0BC4A}
.b-out{background:rgba(224,87,87,.15);color:#F07070}.b-out::before{background:#F07070}
.b-cat{background:rgba(200,151,42,.1);color:var(--gold2);padding:2px 8px;font-size:11px;border-radius:var(--radius-sm)}

/* BUTTONS */
.btn{padding:9px 18px;border-radius:var(--radius-sm);border:none;font-family:var(--font);font-size:13px;font-weight:500;cursor:pointer;transition:.15s;display:inline-flex;align-items:center;justify-content:center;gap:6px}
.btn-ghost{background:var(--bg3);color:var(--text2);border:1px solid var(--border)}
.btn-ghost:hover{background:var(--bg4);color:var(--text);border-color:var(--border2)}
.btn-gold{background:linear-gradient(135deg,var(--gold),var(--gold2));color:#1A0F00;font-weight:600}
.btn-gold:hover{filter:brightness(1.08)}
.btn-sm{padding:6px 12px;font-size:12px}
.btn-danger{background:rgba(224,87,87,.12);color:#F07070;border:1px solid rgba(224,87,87,.25)}
.btn-full{width:100%;padding:13px}

/* FORM */
.form-wrap{max-width:540px}
.form-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:14px}
.form-card-title{font-size:14px;font-weight:500;margin-bottom:14px;padding-bottom:12px;border-bottom:1px solid var(--border)}
.field{margin-bottom:14px}
.field-label{font-size:11px;font-weight:600;color:var(--text3);letter-spacing:.06em;text-transform:uppercase;margin-bottom:7px;display:block}
.field input,.field select{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 14px;color:var(--text);font-family:var(--font);font-size:14px;outline:none;transition:.2s;-webkit-appearance:none}
.field input:focus,.field select:focus{border-color:var(--border2);background:var(--bg4)}
.field input::placeholder{color:var(--text3)}
.field select option{background:var(--bg3)}
.fields-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.type-toggle{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:4px}
.type-opt{padding:14px 10px;border-radius:var(--radius-sm);border:1px solid var(--border);cursor:pointer;text-align:center;transition:.15s;background:var(--bg3)}
.type-opt:hover{border-color:var(--border2)}
.type-opt.sel-e{border-color:var(--green);background:rgba(76,175,122,.08)}
.type-opt.sel-s{border-color:var(--red);background:rgba(224,87,87,.08)}
.type-ico{font-size:22px;margin-bottom:5px}
.type-label{font-size:14px;font-weight:500}
.type-sub{font-size:11px;color:var(--text3);margin-top:2px}
.feedback{padding:10px 14px;border-radius:var(--radius-sm);font-size:13px;margin-top:12px;display:none}
.feedback.ok{background:rgba(76,175,122,.12);border:1px solid rgba(76,175,122,.3);color:#6FD4A0;display:block}
.feedback.err{background:rgba(224,87,87,.12);border:1px solid rgba(224,87,87,.3);color:#F07070;display:block}

/* HISTORY */
.hist-list{display:flex;flex-direction:column;gap:9px}
.hist-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;display:flex;align-items:center;gap:12px}
.hist-ico{width:38px;height:38px;border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:700;flex-shrink:0}
.hi-e{background:rgba(76,175,122,.15);color:var(--green)}
.hi-s{background:rgba(224,87,87,.15);color:var(--red)}
.hist-info{flex:1;min-width:0}
.hist-prod{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hist-meta{font-size:12px;color:var(--text3);margin-top:2px}
.hist-right{text-align:right;flex-shrink:0}
.hist-qty{font-family:'DM Mono',monospace;font-size:16px;font-weight:600}
.hist-qty.pos{color:var(--green)}.hist-qty.neg{color:var(--red)}
.hist-loja{font-size:11px;color:var(--text3);margin-top:2px}

/* ALERTS */
.alert-list{display:flex;flex-direction:column;gap:9px}
.alert-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;display:flex;align-items:center;gap:12px}
.alert-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.alert-info{flex:1;min-width:0}
.alert-name{font-size:14px;font-weight:500}
.alert-store{font-size:12px;color:var(--text3);margin-top:2px}
.alert-right{text-align:right;flex-shrink:0}
.alert-lbl{font-size:10px;color:var(--text3)}
.alert-nums{font-family:'DM Mono',monospace;font-size:16px;font-weight:600}

/* REPORTS */
.report-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
.rep-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:20px}
.rep-title{font-size:11px;font-weight:600;color:var(--text3);letter-spacing:.07em;text-transform:uppercase;margin-bottom:14px}
.rep-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.rep-row:last-child{margin-bottom:0}
.rep-name{font-size:13px;color:var(--text2);min-width:90px;white-space:nowrap}
.rep-bar-wrap{flex:1;height:6px;background:var(--bg4);border-radius:99px}
.rep-bar-fill{height:100%;border-radius:99px;transition:.4s}
.rep-val{font-family:'DM Mono',monospace;font-size:13px;font-weight:500;min-width:28px;text-align:right}

/* CONFIG */
.cfg-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:12px}
.cfg-card-title{font-size:11px;font-weight:600;color:var(--text3);letter-spacing:.07em;text-transform:uppercase;margin-bottom:10px}
.cfg-row{display:flex;align-items:center;gap:12px;padding:13px 18px;border-bottom:1px solid var(--border)}
.cfg-row:last-child{border-bottom:none}
.cfg-info{flex:1;min-width:0}
.cfg-name{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cfg-sub{font-size:12px;color:var(--text3);margin-top:2px}
.cfg-actions{display:flex;gap:7px;flex-shrink:0}
.cfg-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;align-items:start}

/* EMPTY */
.empty{padding:48px 20px;text-align:center;color:var(--text3)}
.empty-icon{font-size:36px;margin-bottom:10px;opacity:.5}
.empty-text{font-size:14px}

/* ─── MODALS ─── */
/* Desktop: centered modal */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:200;align-items:center;justify-content:center;padding:20px}
.overlay.open{display:flex}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--radius-lg);padding:24px;width:100%;max-width:460px;animation:fadeUp .18s ease;max-height:90vh;overflow-y:auto}
.modal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
.modal-title{font-size:17px;font-weight:600}
.modal-close{background:var(--bg3);border:none;color:var(--text2);cursor:pointer;width:30px;height:30px;border-radius:99px;display:flex;align-items:center;justify-content:center;font-size:16px}
.modal-close:hover{background:var(--bg4);color:var(--text)}
.modal-footer{display:flex;gap:10px;justify-content:flex-end;margin-top:18px;padding-top:16px;border-top:1px solid var(--border)}
.modal-footer .btn{min-width:100px}

.confirm-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:300;align-items:center;justify-content:center;padding:20px}
.confirm-overlay.open{display:flex}
.confirm-box{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--radius-lg);padding:24px;width:100%;max-width:340px;animation:fadeUp .18s ease}
.confirm-title{font-size:16px;font-weight:600;margin-bottom:10px}
.confirm-msg{font-size:14px;color:var(--text2);line-height:1.6;margin-bottom:20px}
.confirm-footer{display:flex;gap:10px;justify-content:flex-end}
.confirm-footer .btn{min-width:90px}

/* SCROLLBAR */
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:99px}

.hidden{display:none!important}

/* ─── RESPONSIVE BREAKPOINT ─── */
@media (max-width: 768px) {
  /* hide desktop sidebar */
  .sidebar{display:none}
  /* hide desktop topbar */
  .d-topbar{display:none}
  /* show mobile topbar */
  .m-topbar{display:flex}
  /* show bottom nav */
  .bnav{display:flex}
  /* loja bar adjustments */
  .loja-bar{padding:10px 18px;border-bottom:1px solid var(--border)}
  /* content padding */
  .content-pad{padding:16px 18px 20px}
  /* metrics: 2 cols on mobile */
  .metrics{grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
  .mv{font-size:24px}
  /* reports: 1 col on mobile */
  .report-grid{grid-template-columns:1fr}
  /* cfg grid: 1 col */
  .cfg-grid{grid-template-columns:1fr}
  /* modal as bottom sheet on mobile */

<script>
const SK='cacau_resp_v1';
const ICONS={'Trufas':'🍫','Tabletes':'🍫','Bombons':'🍬','Ovos de Páscoa':'🥚','Drágeas':'🫘','Outros':'📦'};
function defaultDB(){return{
  lojas:['Loja — VG','Loja — LAPA'],
  categorias:['Trufas','Tabletes','Bombons','Ovos de Páscoa','Drágeas','Outros'],
  produtos:[
    {id:1,nome:'Trufa de Maracujá',cat:'Trufas',min:15,qtd:[32,18]},
    {id:2,nome:'Tablete Meio Amargo 80g',cat:'Tabletes',min:20,qtd:[8,45]},
    {id:3,nome:'Bombom Sortido 250g',cat:'Bombons',min:10,qtd:[0,12]},
    {id:4,nome:'Drágea de Amendoim',cat:'Drágeas',min:12,qtd:[24,5]},
    {id:5,nome:'Trufa de Limão',cat:'Trufas',min:10,qtd:[19,21]},
    {id:6,nome:'Tablete Branco 90g',cat:'Tabletes',min:15,qtd:[3,9]},
  ],
  historico:[
    {id:1,data:'2024-06-01 09:15',tipo:'entrada',produto:'Trufa de Maracujá',qty:20,loja:0,obs:'NF 001'},
    {id:2,data:'2024-06-01 11:30',tipo:'saida',produto:'Tablete Meio Amargo 80g',qty:5,loja:1,obs:''},
    {id:3,data:'2024-06-02 08:00',tipo:'entrada',produto:'Bombom Sortido 250g',qty:30,loja:1,obs:''},
    {id:4,data:'2024-06-02 14:20',tipo:'saida',produto:'Drágea de Amendoim',qty:8,loja:0,obs:'Degustação'},
  ],
  nextId:7
}}
function load(){try{const s=localStorage.getItem(SK);return s?JSON.parse(s):defaultDB()}catch(e){return defaultDB()}}
function save(){try{localStorage.setItem(SK,JSON.stringify(db))}catch(e){}}

let db=load(),currentPage='estoque',currentLoja=0,editingId=null,movTipo='entrada',catFilter='',confirmCb=null;
const isMobile=()=>window.innerWidth<=768;

function getStatus(p,l){const q=l>=0?p.qtd[l]:p.qtd[0]+p.qtd[1];const m=l>=0?p.min:p.min*2;return q===0?'out':q<m?'low':'ok'}
function badge(s){if(s==='ok')return'<span class="badge b-ok">Ok</span>';if(s==='low')return'<span class="badge b-low">Baixo</span>';return'<span class="badge b-out">Zerado</span>'}
function barColor(p){return p>50?'#4CAF7A':p>20?'#E8A020':'#E05757'}
function icon(c){return ICONS[c]||'📦'}

function applyLayout(){
  const mobile=isMobile();
  document.getElementById('loja-bar-mobile').style.display=mobile?'flex':'none';
  document.getElementById('m-search-wrap').style.display=mobile?'block':'none';
  document.getElementById('d-search-wrap').style.display=mobile?'none':'flex';
  document.getElementById('d-add-btn').style.display=mobile?'none':'flex';
  document.getElementById('d-table-wrap').style.display=mobile?'none':'block';
  document.getElementById('m-prod-list').style.display=mobile?'flex':'none';
}

function navTo(page,el,type){
  if(type==='sb'){document.querySelectorAll('.sb-item').forEach(b=>b.classList.remove('active'));if(el)el.classList.add('active')}
  else if(type==='nb'){document.querySelectorAll('.nb').forEach(b=>b.classList.remove('active'));if(el)el.classList.add('active')}
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById('pg-'+page).classList.add('active');
  currentPage=page;
  const titles={estoque:'Estoque',movimentar:'Movimentar',historico:'Histórico',alertas:'Alertas',relatorios:'Relatórios',configuracoes:'Configurações'};
  document.getElementById('d-page-title').textContent=titles[page]||page;
  const showSearch=page==='estoque';
  document.getElementById('d-search-wrap').style.display=showSearch&&!isMobile()?'flex':'none';
  document.getElementById('d-add-btn').style.display=page==='estoque'&&!isMobile()?'flex':'none';
  renderPage();
  document.querySelector('.content-scroll').scrollTo(0,0);
}

function setLoja(l){
  currentLoja=l;
  [-1,0,1].forEach(i=>{
    const id=i===-1?'lp-1':'lp'+i;const el=document.getElementById(id);if(el)el.classList.toggle('active',i===l);
    const sid=i===-1?'sbs-1':'sbs'+i;const sel=document.getElementById(sid);if(sel)sel.classList.toggle('active',i===l);
  });
  const names={0:'Loja — VG',1:'Loja — LAPA','-1':'Visão Geral'};
  document.getElementById('d-page-sub').textContent=names[l];
  const ml=document.getElementById('m-loja-label');if(ml)ml.textContent=names[l];
  renderPage();
}

function renderPage(){
  applyLayout();
  if(currentPage==='estoque')renderEstoque();
  else if(currentPage==='movimentar')renderMovimentar();
  else if(currentPage==='historico')renderHistorico();
  else if(currentPage==='alertas')renderAlertas();
  else if(currentPage==='relatorios')renderRelatorios();
  else if(currentPage==='configuracoes')renderConfiguracoes();
  updateBadge();
}

function updateBadge(){
  let n=0;
  db.produtos.forEach(p=>{(currentLoja>=0?[currentLoja]:[0,1]).forEach(li=>{if(getStatus(p,li)!=='ok')n++})});
  ['sb-alert-count','nb-alert-count'].forEach(id=>{const el=document.getElementById(id);if(el){el.textContent=n;el.style.display=n?'':'none'}});
  const mb=document.getElementById('m-alert-badge');if(mb){mb.textContent=n+'!';mb.style.display=n?'':'none'}
}

function getSearch(){return isMobile()?(document.getElementById('m-search')||{value:''}).value.toLowerCase():(document.getElementById('d-search')||{value:''}).value.toLowerCase()}

function renderEstoque(){
  const s=getSearch();
  let ps=db.produtos.filter(p=>(!s||(p.nome.toLowerCase().includes(s)||p.cat.toLowerCase().includes(s)))&&(!catFilter||p.cat===catFilter));
  const tot=db.produtos.length,unids=ps.reduce((a,p)=>a+(currentLoja>=0?p.qtd[currentLoja]:p.qtd[0]+p.qtd[1]),0);
  const baixo=db.produtos.filter(p=>getStatus(p,currentLoja)==='low').length,zerado=db.produtos.filter(p=>getStatus(p,currentLoja)==='out').length;
  document.getElementById('metrics').innerHTML=`
    <div class="metric cg"><div class="ml">Produtos</div><div class="mv gold">${tot}</div><div class="ms">cadastrados</div></div>
    <div class="metric cgr"><div class="ml">Unidades</div><div class="mv green">${unids}</div><div class="ms">em estoque</div></div>
    <div class="metric ca"><div class="ml">Est. baixo</div><div class="mv amber">${baixo}</div><div class="ms">produtos</div></div>
    <div class="metric cr"><div class="ml">Zerados</div><div class="mv red">${zerado}</div><div class="ms">produtos</div></div>`;
  const cats=[...new Set(db.produtos.map(p=>p.cat))];
  document.getElementById('cat-row').innerHTML=`<button class="cat-btn${!catFilter?' active':''}" onclick="setCat('')">Todos</button>`+cats.map(c=>`<button class="cat-btn${catFilter===c?' active':''}" onclick="setCat('${c}')">${c}</button>`).join('');
  const maxQ=Math.max(...db.produtos.map(p=>currentLoja>=0?p.qtd[currentLoja]:p.qtd[0]+p.qtd[1]),1);
  // desktop table
  document.getElementById('d-tbody').innerHTML=ps.length===0
    ?`<tr><td colspan="6" style="text-align:center;padding:32px;color:var(--text3)">Nenhum produto encontrado</td></tr>`
    :ps.map(p=>{const q=currentLoja>=0?p.qtd[currentLoja]:p.qtd[0]+p.qtd[1];const pct=Math.round(q/maxQ*100);return`<tr>
      <td style="font-weight:500">${p.nome}</td>
      <td><span class="b-cat">${p.cat}</span></td>
      <td><div class="qty-wrap"><span class="qty-num">${q}</span><div class="qty-bar-wrap"><div class="qty-bar" style="width:${pct}%;background:${barColor(pct)}"></div></div></div></td>
      <td style="color:var(--text3)">${p.min}</td>
      <td>${badge(getStatus(p,currentLoja))}</td>
      <td><button class="btn btn-ghost btn-sm" onclick="openProdModal(${p.id})">Editar</button></td>
    </tr>`;}).join('');
  // mobile cards
  document.getElementById('m-prod-list').innerHTML=ps.length===0
    ?'<div class="empty"><div class="empty-icon">🔍</div><div class="empty-text">Nenhum produto encontrado</div></div>'
    :ps.map(p=>{const q=currentLoja>=0?p.qtd[currentLoja]:p.qtd[0]+p.qtd[1];const pct=Math.round(q/maxQ*100);return`
      <div class="prod-card">
        <div class="prod-icon">${icon(p.cat)}</div>
        <div class="prod-info"><div class="prod-name">${p.nome}</div><div class="prod-cat">${p.cat}</div>${badge(getStatus(p,currentLoja))}</div>
        <div class="prod-right"><div class="prod-qty" style="color:${barColor(pct)}">${q}</div><div class="prod-bar"><div class="prod-bar-fill" style="width:${pct}%;background:${barColor(pct)}"></div></div></div>
      </div>`;}).join('');
}
function setCat(c){catFilter=c;renderEstoque()}
function renderMovimentar(){document.getElementById('mov-prod').innerHTML=db.produtos.map(p=>`<option value="${p.id}">${p.nome}</option>`).join('')}
function selTipo(t){
  movTipo=t;
  document.getElementById('opt-e').className='type-opt'+(t==='entrada'?' sel-e':'');
  document.getElementById('opt-s').className='type-opt'+(t==='saida'?' sel-s':'');
}
function registrar(){
  const loja=parseInt(document.getElementById('mov-loja').value);
  const pid=parseInt(document.getElementById('mov-prod').value);
  const qty=parseInt(document.getElementById('mov-qty').value)||0;
  const obs=document.getElementById('mov-obs').value.trim();
  const fb=document.getElementById('mov-fb');
  const p=db.produtos.find(x=>x.id===pid);
  if(!p||qty<=0){fb.className='feedback err';fb.textContent='Preencha todos os campos.';return}
  if(movTipo==='saida'&&p.qtd[loja]<qty){fb.className='feedback err';fb.textContent=`Estoque insuficiente. Disponível: ${p.qtd[loja]} unidades.`;return}
  p.qtd[loja]+=movTipo==='entrada'?qty:-qty;
  const now=new Date();
  db.historico.push({id:db.nextId++,data:now.toISOString().slice(0,10)+' '+now.toTimeString().slice(0,5),tipo:movTipo,produto:p.nome,qty,loja,obs});
  save();fb.className='feedback ok';fb.textContent='Movimentação registrada!';
  document.getElementById('mov-qty').value=1;document.getElementById('mov-obs').value='';
  updateBadge();setTimeout(()=>{fb.className='feedback';fb.textContent=''},2500);
}
function renderHistorico(){
  const hist=[...db.historico].reverse().filter(h=>currentLoja<0||h.loja===currentLoja);
  document.getElementById('hist-list').innerHTML=!hist.length
    ?'<div class="empty"><div class="empty-icon">📋</div><div class="empty-text">Nenhuma movimentação ainda</div></div>'
    :hist.map(h=>`<div class="hist-card">
      <div class="hist-ico ${h.tipo==='entrada'?'hi-e':'hi-s'}">${h.tipo==='entrada'?'↓':'↑'}</div>
      <div class="hist-info"><div class="hist-prod">${h.produto}</div><div class="hist-meta">${h.obs||'—'} · ${h.data}</div></div>
      <div class="hist-right"><div class="hist-qty ${h.tipo==='entrada'?'pos':'neg'}">${h.tipo==='entrada'?'+':'-'}${h.qty}</div><div class="hist-loja">${db.lojas[h.loja]}</div></div>
    </div>`).join('');
}
function renderAlertas(){
  const ls=currentLoja>=0?[currentLoja]:[0,1];let items=[];
  db.produtos.forEach(p=>ls.forEach(li=>{const st=getStatus(p,li);if(st!=='ok')items.push({p,li,st,q:p.qtd[li]})}));
  document.getElementById('alert-list').innerHTML=!items.length
    ?'<div class="empty"><div class="empty-icon">✅</div><div class="empty-text">Tudo em ordem!</div></div>'
    :items.map(({p,li,st,q})=>`<div class="alert-card">
      <div class="alert-dot" style="background:${st==='out'?'#E05757':'#E8A020'}"></div>
      <div class="alert-info"><div class="alert-name">${p.nome}</div><div class="alert-store">${db.lojas[li]}</div></div>
      <div class="alert-right"><div class="alert-lbl">Atual / Mín</div><div class="alert-nums" style="color:${st==='out'?'#F07070':'#F0BC4A'}">${q}/${p.min}</div>${badge(st)}</div>
    </div>`).join('');
}
function renderRelatorios(){
  const t1=db.produtos.reduce((a,p)=>a+p.qtd[0],0),t2=db.produtos.reduce((a,p)=>a+p.qtd[1],0),maxT=Math.max(t1,t2,1);
  const mE1=db.historico.filter(h=>h.loja===0&&h.tipo==='entrada').reduce((a,h)=>a+h.qty,0);
  const mS1=db.historico.filter(h=>h.loja===0&&h.tipo==='saida').reduce((a,h)=>a+h.qty,0);
  const mE2=db.historico.filter(h=>h.loja===1&&h.tipo==='entrada').reduce((a,h)=>a+h.qty,0);
  const mS2=db.historico.filter(h=>h.loja===1&&h.tipo==='saida').reduce((a,h)=>a+h.qty,0);
  const mx=Math.max(mE1,mS1,mE2,mS2,1);
  document.getElementById('rep-wrap').innerHTML=`
    <div class="metrics" style="margin-bottom:20px">
      <div class="metric cg"><div class="ml">Total VG</div><div class="mv gold">${t1}</div><div class="ms">unidades</div></div>
      <div class="metric cgr"><div class="ml">Total LAPA</div><div class="mv green">${t2}</div><div class="ms">unidades</div></div>
      <div class="metric ca"><div class="ml">Entradas</div><div class="mv amber">${mE1+mE2}</div><div class="ms">unidades</div></div>
      <div class="metric cr"><div class="ml">Saídas</div><div class="mv red">${mS1+mS2}</div><div class="ms">unidades</div></div>
    </div>
    <div class="report-grid">
      <div class="rep-card"><div class="rep-title">Estoque por loja</div>
        <div class="rep-row"><span class="rep-name">Loja VG</span><div class="rep-bar-wrap"><div class="rep-bar-fill" style="width:${Math.round(t1/maxT*100)}%;background:var(--gold)"></div></div><span class="rep-val">${t1}</span></div>
        <div class="rep-row"><span class="rep-name">Loja LAPA</span><div class="rep-bar-wrap"><div class="rep-bar-fill" style="width:${Math.round(t2/maxT*100)}%;background:var(--green)"></div></div><span class="rep-val">${t2}</span></div>
      </div>
      <div class="rep-card"><div class="rep-title">Movimentações</div>
        <div class="rep-row"><span class="rep-name">VG Entradas</span><div class="rep-bar-wrap"><div class="rep-bar-fill" style="width:${Math.round(mE1/mx*100)}%;background:var(--green)"></div></div><span class="rep-val">${mE1}</span></div>
        <div class="rep-row"><span class="rep-name">VG Saídas</span><div class="rep-bar-wrap"><div class="rep-bar-fill" style="width:${Math.round(mS1/mx*100)}%;background:var(--red)"></div></div><span class="rep-val">${mS1}</span></div>
        <div class="rep-row"><span class="rep-name">LAPA Entradas</span><div class="rep-bar-wrap"><div class="rep-bar-fill" style="width:${Math.round(mE2/mx*100)}%;background:var(--green)"></div></div><span class="rep-val">${mE2}</span></div>
        <div class="rep-row"><span class="rep-name">LAPA Saídas</span><div class="rep-bar-wrap"><div class="rep-bar-fill" style="width:${Math.round(mS2/mx*100)}%;background:var(--red)"></div></div><span class="rep-val">${mS2}</span></div>
      </div>
    </div>
    <div class="table-card"><div class="table-header"><span class="table-header-title">Comparativo detalhado</span></div>
      <table><thead><tr><th>Produto</th><th>VG</th><th>LAPA</th><th>Total</th><th>Status</th></tr></thead>
      <tbody>${db.produtos.map(p=>`<tr><td style="font-weight:500">${p.nome}</td><td>${p.qtd[0]}</td><td>${p.qtd[1]}</td><td style="font-weight:600">${p.qtd[0]+p.qtd[1]}</td><td>${badge(getStatus(p,-1))}</td></tr>`).join('')}</tbody></table>
    </div>`;
}
function renderConfiguracoes(){
  document.getElementById('cfg-prods').innerHTML=!db.produtos.length
    ?'<div class="cfg-row"><div class="cfg-info"><div class="cfg-sub">Nenhum produto</div></div></div>'
    :db.produtos.map(p=>`<div class="cfg-row">
      <div class="cfg-info"><div class="cfg-name">${p.nome}</div><div class="cfg-sub">${p.cat} · VG: ${p.qtd[0]} · LAPA: ${p.qtd[1]}</div></div>
      <div class="cfg-actions"><button class="btn btn-ghost btn-sm" onclick="openProdModal(${p.id})">Editar</button><button class="btn btn-danger btn-sm" onclick="confirmarExcluirProd(${p.id})">Excluir</button></div>
    </div>`).join('');
  document.getElementById('cfg-cats').innerHTML=!db.categorias.length
    ?'<div class="cfg-row"><div class="cfg-info"><div class="cfg-sub">Nenhuma categoria</div></div></div>'
    :db.categorias.map(c=>{const n=db.produtos.filter(p=>p.cat===c).length;return`<div class="cfg-row">
      <div class="cfg-info"><div class="cfg-name">${icon(c)} ${c}</div><div class="cfg-sub">${n} produto${n!==1?'s':''}</div></div>
      <div class="cfg-actions">${n===0?`<button class="btn btn-danger btn-sm" onclick="confirmarExcluirCat('${c}')">Excluir</button>`:`<span style="font-size:12px;color:var(--text3)">em uso</span>`}</div>
    </div>`;}).join('');
}
function openProdModal(editId){
  editingId=editId||null;
  document.getElementById('add-cat').innerHTML=db.categorias.map(c=>`<option>${c}</option>`).join('');
  if(editId){
    const p=db.produtos.find(x=>x.id===editId);if(!p)return;
    document.getElementById('prod-modal-title').textContent='Editar produto';
    document.getElementById('add-nome').value=p.nome;document.getElementById('add-cat').value=p.cat;
    document.getElementById('add-min').value=p.min;document.getElementById('add-q1').value=p.qtd[0];document.getElementById('add-q2').value=p.qtd[1];
    document.getElementById('prod-save-btn').textContent='Salvar';
  } else {
    document.getElementById('prod-modal-title').textContent='Novo produto';
    document.getElementById('add-nome').value='';document.getElementById('add-min').value=10;
    document.getElementById('add-q1').value=0;document.getElementById('add-q2').value=0;
    document.getElementById('prod-save-btn').textContent='Adicionar';
  }
  document.getElementById('overlay-prod').classList.add('open');
  setTimeout(()=>document.getElementById('add-nome').focus(),120);
}
function closeProdModal(){document.getElementById('overlay-prod').classList.remove('open');editingId=null}
function salvarProduto(){
  const nome=document.getElementById('add-nome').value.trim();if(!nome)return;
  const cat=document.getElementById('add-cat').value,min=parseInt(document.getElementById('add-min').value)||10;
  const q1=parseInt(document.getElementById('add-q1').value)||0,q2=parseInt(document.getElementById('add-q2').value)||0;
  if(editingId){const p=db.produtos.find(x=>x.id===editingId);if(p){p.nome=nome;p.cat=cat;p.min=min;p.qtd=[q1,q2]}}
  else db.produtos.push({id:db.nextId++,nome,cat,min,qtd:[q1,q2]});
  save();closeProdModal();renderPage();
}
function confirmarExcluirProd(id){
  const p=db.produtos.find(x=>x.id===id);if(!p)return;
  document.getElementById('confirm-msg').textContent=`Excluir "${p.nome}"? O histórico será mantido.`;
  confirmCb=()=>{db.produtos=db.produtos.filter(x=>x.id!==id);save();closeConfirm();renderPage()};
  document.getElementById('overlay-confirm').classList.add('open');
}
function confirmarExcluirCat(cat){
  document.getElementById('confirm-msg').textContent=`Excluir a categoria "${cat}"?`;
  confirmCb=()=>{db.categorias=db.categorias.filter(c=>c!==cat);save();closeConfirm();renderPage()};
  document.getElementById('overlay-confirm').classList.add('open');
}
function closeConfirm(){document.getElementById('overlay-confirm').classList.remove('open');confirmCb=null}
document.getElementById('confirm-ok').addEventListener('click',()=>{if(confirmCb)confirmCb()});
function addCat(){
  const inp=document.getElementById('nova-cat'),nome=inp.value.trim(),fb=document.getElementById('cat-fb');
  if(!nome){fb.className='feedback err';fb.textContent='Digite o nome.';return}
  if(db.categorias.some(c=>c.toLowerCase()===nome.toLowerCase())){fb.className='feedback err';fb.textContent='Já existe.';return}
  db.categorias.push(nome);save();inp.value='';
  fb.className='feedback ok';fb.textContent=`"${nome}" adicionada!`;
  setTimeout(()=>{fb.className='feedback';fb.textContent=''},2000);
  renderConfiguracoes();
}
function openMais(){document.getElementById('mais-overlay').classList.add('open')}
function closeMais(){document.getElementById('mais-overlay').classList.remove('open')}
window.addEventListener('resize',()=>{applyLayout();renderEstoque()});
document.addEventListener('keydown',e=>{if(e.key==='Escape'){closeProdModal();closeConfirm();closeMais()}});
renderPage();
</script>
</body>
</html>
